name: Mirror from Hugging Face (LFS-safe)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git LFS (skip download of binaries)
        run: |
          git lfs install --skip-smudge

      - name: Fetch from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote remove hf || true
          git remote add hf https://huggingface.co/spaces/Youmei295/choice-matter-demo.git

          git -c http.extraHeader="Authorization: Bearer $HF_TOKEN" \
            fetch hf main --prune --tags --force

      - name: Checkout HF branch safely
        run: |
          git checkout -B hf_main hf/main

      - name: Sync to GitHub main
        run: |
          git checkout -B main hf_main

      - name: Push to GitHub mirror
        run: |
          git push origin main --force
