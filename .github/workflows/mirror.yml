name: Mirror to GitHub

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false   # do not reuse GITHUB_TOKEN for pushing to mirror

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to GitHub mirror
        env:
          TOKEN: ${{ secrets.token }}
        run: |
          # Add remote using token from secret (token must have repo access on target)
          git remote add mirror https://x-access-token:${TOKEN}@github.com/Youmei295/choice-matter-demo-mirror.git

          # Mirror all refs (branches, tags, refs) to the target, forcefully.
          # WARNING: --mirror will make the target match the source exactly (including deletions).
          git push --mirror --force mirror