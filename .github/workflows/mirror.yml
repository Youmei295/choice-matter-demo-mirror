name: Mirror from Hugging Face (NO LFS CLEAN)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install repo from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          rm -rf repo
          mkdir repo
          cd repo

          git init

          git remote add hf https://huggingface.co/spaces/Youmei295/choice-matter-demo.git

          git -c http.extraHeader="Authorization: Bearer $HF_TOKEN" \
            fetch hf main

          git checkout -b main FETCH_HEAD

      - name: REMOVE ALL LFS TRACKING
        run: |
          rm -f .gitattributes || true

          git lfs uninstall || true

          git lfs migrate export --include="*" || true

      - name: Commit clean repo
        run: |
          git add -A
          git commit -m "clean mirror (no lfs)" || echo "no changes"

      - name: Push to GitHub
        run: |
          git push origin main --force
