name: HF → GitHub Sync (stable no-rsync)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone Hugging Face repo (stable)
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          rm -rf hf_repo
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/Youmei295/choice-matter-demo.git hf_repo

      - name: Sync files safely (NO rsync)
        run: |
          rm -rf ./*
          rm -rf .github

          cp -r hf_repo/. .

      - name: Commit changes
        run: |
          git add -A
          git commit -m "sync from huggingface" || echo "no changes"

      - name: Push to GitHub
        run: |
          git push origin main --force
