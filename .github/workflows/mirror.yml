name: Mirror from Hugging Face (stable no-LFS)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: FULL disable Git LFS (critical fix)
        run: |
          git lfs uninstall || true

          git config --global filter.lfs.clean ""
          git config --global filter.lfs.smudge ""
          git config --global filter.lfs.process ""
          git config --global filter.lfs.required false

          git config --global lfs.allowincompletepush true

      - name: Fetch from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote remove hf || true
          git remote add hf https://huggingface.co/spaces/Youmei295/choice-matter-demo.git

          git -c http.extraHeader="Authorization: Bearer $HF_TOKEN" \
            fetch hf main --prune --tags --force

      - name: Checkout HF branch
        run: |
          git checkout -B main hf/main

      - name: Commit sync safely
        run: |
          git add -A
          git commit -m "sync from huggingface (no LFS)" || echo "no changes"

      - name: Push to GitHub (LFS bypassed)
        run: |
          git push origin main --force
