name: Mirror from Hugging Face (safe LFS-free GitHub)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub mirror repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disable LFS download (avoid broken assets crash)
        run: |
          git lfs install --skip-smudge

      - name: Fetch from Hugging Face
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git remote remove hf || true
          git remote add hf https://huggingface.co/spaces/Youmei295/choice-matter-demo.git

          git -c http.extraHeader="Authorization: Bearer $HF_TOKEN" \
            fetch hf main --prune --tags --force

      - name: Checkout HF content
        run: |
          git checkout -B hf_main hf/main

      - name: Switch to main branch
        run: |
          git checkout -B main hf_main

      - name: Commit changes (skip if none)
        run: |
          git add -A
          git commit -m "sync from huggingface" || echo "No changes"

      - name: Push to GitHub (NO LFS upload)
        env:
          GIT_LFS_SKIP_SMUDGE: 1
        run: |
          git push origin main --force
