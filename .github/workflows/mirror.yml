name: HF → GitHub Sync (stable no-rsync)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 * * * *' # Uncomment these two lines to run automatically every hour

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone Hugging Face repo (stable)
        env:
          HF_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          rm -rf hf_repo
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/Youmei295/choice-matter-demo.git hf_repo

      - name: Sync files safely (NO rsync)
        run: |
          # 1. Remove the .git folder from the HF clone so it doesn't corrupt GitHub's git history
          rm -rf hf_repo/.git
          
          # 2. Delete everything in the GitHub workspace EXCEPT .git, .github, and the hf_repo folder
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'hf_repo' -exec rm -rf {} +
          
          # 3. Copy the HF files over (using -a to preserve hidden files like .gitattributes)
          cp -a hf_repo/. .
          
          # 4. Clean up the cloned repo folder
          rm -rf hf_repo

      - name: Commit changes
        run: |
          git add -A
          git commit -m "sync from huggingface" || echo "no changes"

      - name: Push to GitHub
        run: |
          git push origin main
